<!DOCTYPE HTML>
<html lang="en">
	<head>
		<link rel="icon" type="image/png" href="images/logo.png">
		<title>Welcome - Benjamin Gimenez</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* --- VARIABLES Y RESET --- */
			:root {
				--bg-color: #000; --text-color: #fff; --accent-color: #ff0000;
				--card-bg: #111; --card-border: #222; --box-transparent: rgba(0,0,0,0.9);
			}
			body.light-mode {
				--bg-color: #f4f4f4; --text-color: #111; --accent-color: #cc0000;
				--card-bg: #fff; --card-border: #ccc; --box-transparent: rgba(255,255,255,0.95);
			}
			body, html { margin: 0; padding: 0; background-color: var(--bg-color) !important; color: var(--text-color); overflow-x: hidden; scroll-behavior: smooth; }

			/* --- CONTROLES Y LOGO --- */
			.top-controls { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; gap: 10px; }
			.control-btn { background: var(--box-transparent); color: var(--text-color); border: 1px solid var(--accent-color); padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 5px; text-align: center; }
			.floating-logo { position: fixed; bottom: 20px; right: 20px; width: 100px; z-index: 9999; }

			/* --- IDIOMAS --- */
			.lang-es { display: none; }
			body.es-mode .lang-en { display: none; }
			body.es-mode .lang-es { display: inline-block; }

			/* --- ANIMACIONES DE REVELADO (SCROLL) --- */
			.reveal { position: relative; opacity: 0; transition: all 1.2s ease; }
			.reveal.active { opacity: 1; }

			/* Efecto "The Moment is Now" (Nombre Gigante) */
			.reveal-mask { 
				overflow: hidden; 
				display: block;
			}
			.reveal-mask span {
				display: block;
				transform: translateY(100%);
				transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1);
			}
			.reveal-mask.active span { transform: translateY(0); }

			/* --- SECCIONES --- */
			#hero-header { position: relative; height: 100vh; display: flex; align-items: center; overflow: hidden; background: #000; }
			#hero-header video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; z-index: 1; }
			.video-overlay-text { position: relative; z-index: 2; padding-left: 5%; }
			.video-overlay-text h2 { color: var(--accent-color) !important; font-size: clamp(3rem, 12vw, 9rem); line-height: 0.85; font-weight: 900; text-transform: uppercase; margin: 0; }

			.about-section { position: relative; padding: 120px 0; background: url('images/presentacion.jpg') center/cover no-repeat; border-top: 5px solid var(--accent-color); }
			.about-content { background: var(--box-transparent); padding: 50px; margin-left: 5%; max-width: 600px; border-left: 5px solid var(--accent-color); }
