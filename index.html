		<style>
			/* =========================================
			   VARIABLES Y TEMAS
			   ========================================= */
			:root {
				--bg-color: #000000;
				--text-color: #ffffff;
				--accent-color: #ff0000;
				--card-bg: #111111;
				--card-border: #222222;
				--box-transparent: rgba(0,0,0,0.9);
				--btn-hover-text: #000000;
			}

			body.light-mode {
				--bg-color: #f4f4f4;
				--text-color: #111111;
				--accent-color: #cc0000;
				--card-bg: #ffffff;
				--card-border: #cccccc;
				--box-transparent: rgba(255,255,255,0.95);
				--btn-hover-text: #ffffff;
			}

			/* --- ESTILOS GENERALES --- */
			body, html { 
				margin: 0; padding: 0; 
				background-color: var(--bg-color) !important; 
				color: var(--text-color); 
				overflow-x: hidden; 
				font-family: sans-serif; 
				transition: background-color 0.3s ease, color 0.3s ease;
				height: 100%;
			}

			/* --- CONTROLES SUPERIORES (OPTIMIZADO) --- */
			.top-controls {
				position: fixed;
				top: 20px;
				right: 20px;
				z-index: 10000;
				display: flex;
				gap: 10px;
			}
			.control-btn {
				background: var(--box-transparent);
				color: var(--text-color);
				border: 1px solid var(--accent-color);
				padding: 8px 15px;
				cursor: pointer;
				font-weight: bold;
				text-transform: uppercase;
				border-radius: 5px;
				transition: all 0.3s ease;
				backdrop-filter: blur(5px);
				display: flex;
				align-items: center;
				justify-content: center;
				text-align: center;
				min-width: 100px;
			}
			.control-btn:hover {
				background: var(--accent-color);
				color: var(--btn-hover-text);
			}

			/* --- LOGO FLOTANTE --- */
			.floating-logo { position: fixed; bottom: 20px; right: 20px; width: 100px; z-index: 9999; }

			/* --- IDIOMAS --- */
			.lang-es { display: none; }
			body.es-mode .lang-en { display: none; }
			body.es-mode .lang-es { display: inline; }

			/* --- SISTEMA DE SPA (ROUTING) --- */
			.view { display: none; opacity: 0; transition: opacity 0.5s ease; }
			.view.active { display: block; opacity: 1; animation: fadeIn 0.8s ease forwards; }
			@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

				display: flex; 
				align-items: center; 
				overflow: hidden; 
				background: #000;
